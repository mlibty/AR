<html>
  <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 5; renderer="colorManagement: true, physicallyCorrectLights; alpha: true; antialias: false; precision: mediump" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <img id="image" src="./galerija.jpg" />
        <a-asset-item id="video" src="./video.mp4"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane src="#image" position="0 0 0" height="1" width="1" rotation="0 0 0"></a-plane>
        <a-video rotation="0 0 0 " position="0 0 0.1" width="1" height="1" src="#video" animation="property: position; to: 0 0 0.1; easing: easeInOutQuad; loop: true; dir: alternate">
      </a-entity>
    </a-scene>
  </body>
</html>
