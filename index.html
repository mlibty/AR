<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    a-scene {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<script>
window.onload = async () => {

  const video = document.querySelector("#video");

  // Force iOS video init
  video.setAttribute("playsinline", "");
  video.setAttribute("webkit-playsinline", "");
  video.muted = true;

  try {
    await video.play();
    video.pause();
    video.currentTime = 0;
    console.log("Video unlocked");
  } catch(e) {
    console.log("Video unlock failed", e);
  }

};
</script>
<body>

<a-scene
  mindar-image="
    imageTargetSrc: ./targets.mind;
    autoStart: true;
    uiScanning: true;
    uiLoading: true;
    showStats: false;
  "
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  loading-screen="enabled: false"
  embedded
>

  <a-assets>

    <!-- IMAGE -->
    <img
      id="card"
      src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png"
    />

    <!-- 3D MODEL -->
    <a-asset-item
      id="avatarModel"
      src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/softmind/scene.gltf"
    ></a-asset-item>

    <!-- VIDEO -->
    <video
      id="video"
     src="./video.mp4"
      preload="auto"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  ></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- IMAGE -->
    <a-plane
      src="#card"
      position="0 0 0"
      height="0.552"
      width="1"
      rotation="0 0 0"
    ></a-plane>

    <!-- VIDEO OVERLAY -->
    <a-video
      src="#video"
      position="0 0 0.02"
      width="1"
      height="0.552"
      rotation="0 0 0"
    ></a-video>

    <!-- 3D MODEL -->
    <a-gltf-model
      src="#avatarModel"
      position="0 -0.3 0.1"
      rotation="0 0 0"
      scale="0.005 0.005 0.005"
      animation="
        property: position;
        to: 0 -0.2 0.1;
        dur: 1000;
        easing: easeInOutQuad;
        loop: true;
        dir: alternate;
      "
    ></a-gltf-model>

  </a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const video = document.querySelector("#video");
  const sceneEl = document.querySelector("a-scene");

  // Start video once AR is ready
  sceneEl.addEventListener("arReady", async () => {

    try {
      await video.play();
      console.log("Video playing");
    } catch (e) {
      console.error("Video play failed", e);
    }

  });

  sceneEl.addEventListener("arError", () => {
    alert("AR failed to start");
  });

});
</script>

</body>
</html>
