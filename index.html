<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: transparent;
  }

  a-scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
  }

  #overlayVideo {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100vw;
    height: 100vh;
    transform: translate(-50%, -50%);
    object-fit: contain;
    background: transparent;
    display: none;
    z-index: 2;
    pointer-events: none;
  }
</style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 5;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="
  alpha: true;
  antialias: false;
  precision: mediump;
"
  >
    <a-assets>
      <video
  id="video"
  src="./video.mp4"
  muted
  loop
  playsinline
  webkit-playsinline
  preload="auto"
  crossorigin="anonymous"
></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
     <video
  id="overlayVideo"
  src="./video.mp4"
  muted
  loop
  autoplay
  playsinline
  webkit-playsinline
  preload="auto"
  poster="./poster.jpg"
></video>
    </a-entity>
  </a-scene>

  <script>
document.addEventListener("DOMContentLoaded", () => {
  const video = document.querySelector("#overlayVideo");
  const target = document.querySelector("#target");
  let unlocked = false;
  let playing = false;

  async function unlockVideo() {
    if (unlocked) return;
    unlocked = true;
    try {
      video.load();
      await video.play();
      video.pause();
      video.currentTime = 0;
    } catch (e) {}
  }

  async function startVideo() {
    if (playing) return;
    try {
      video.style.display = "block";
      video.load();
      await video.play();
      playing = true;
    } catch (e) {
      console.log(e);
    }
  }

  function stopVideo() {
    playing = false;
    video.pause();
    video.style.display = "none";
  }

  target.addEventListener("targetFound", startVideo);
  target.addEventListener("targetLost", stopVideo);

  document.body.addEventListener("touchend", unlockVideo, { once: true });
  document.body.addEventListener("click", unlockVideo, { once: true });
});
</script>
</body>
</html>
