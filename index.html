<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    a-scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; warmupTolerance: 3; missTolerance: 20;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="
  alpha: true;
  antialias: false;
  precision: mediump;
  logarithmicDepthBuffer: false;
"
  >
    <a-assets>
      <video
        id="video"
        src="./video.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-plane
  src="#video"
  position="0 0 0.1"
  width="0.9"
  height="1.0"
  material="
  shader: flat;
  transparent: false;
  depthTest: false;
  depthWrite: false;
"
></a-plane>
    </a-entity>
  </a-scene>

 <script>
document.addEventListener("DOMContentLoaded", () => {

  const scene = document.querySelector("a-scene");
  const video = document.querySelector("#video");
  const plane = document.querySelector("a-plane");

  let ready = false;

  function startVideoSafe() {
    video.muted = true;
    video.playsInline = true;

    video.play().then(() => {
      requestAnimationFrame(() => {
        ready = true;
      });
    }).catch(() => {});
  }

  scene.addEventListener("arReady", () => {
    startVideoSafe();
  });

  // 🔥 critical Android fix: ensure texture updates continuously
  video.addEventListener("timeupdate", () => {
    if (plane && ready) {
      plane.components.material.material.map.needsUpdate = true;
    }
  });

});
</script>
</body>
</html>
