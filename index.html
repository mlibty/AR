<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    a-scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; warmupTolerance: 3; missTolerance: 20;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="alpha: true; antialias: true; precision: highp; colorManagement: true; physicallyCorrectLights: false; sortObjects: true;"
  >
    <a-assets>
      <video
        id="video"
        src="./video.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0" visible="false">
      <a-plane
        id="videoPlane"
        src="#video"
        position="0 0 0.001"
        width="1.0"
        height="0.5625"
        material="shader: flat; side: double; transparent: true; depthTest: false; depthWrite: false; alphaTest: 0.01; toneMapped: false;"
      ></a-plane>
    </a-entity>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const scene = document.querySelector("a-scene");
      const target = document.querySelector("#target");
      const video = document.querySelector("#video");

      const start = async () => {
        try {
          if (video.paused) await video.play();
        } catch (e) {}
      };

      const stop = () => {
        try { video.pause(); } catch (e) {}
      };

      target.addEventListener("targetFound", () => {
        target.setAttribute("visible", "true");
        start();
      });

      target.addEventListener("targetLost", () => {
        target.setAttribute("visible", "false");
        stop();
      });

      scene.addEventListener("arReady", () => {
        video.load();
      });

      document.body.addEventListener("touchend", start, { once: true });
      document.body.addEventListener("click", start, { once: true });
    });
  </script>
</body>
</html>
