<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    a-scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 5;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="alpha: true; antialias: false; precision: mediump; logarithmicDepthBuffer: false;"
  >
    <a-assets>
      <video
        id="video"
        src="./video.mp4"
        preload="auto"
        muted
        autoplay
        loop
        playsinline
        webkit-playsinline
        x-webkit-airplay="allow"
        playsinline
disablepictureinpicture
disableremoteplayback
        crossorigin="anonymous"
              ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-video
  id="videoPlane"
  src="#video"
  position="0 0 0"
  width="1"
  height="1"
  material="
    shader: flat;
    transparent: false;
    side: front;
    depthTest: true;
    depthWrite: false;
  "
></a-video>
    </a-entity>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const scene = document.querySelector("a-scene");
      const video = document.querySelector("#video");
      const plane = document.querySelector("#videoPlane");
      const target = document.querySelector("#target");

      let ready = false;
      let started = false;

      function playVideo() {
        if (started) return;
        started = true;
        video.muted = true;
        video.setAttribute("muted", "");
        video.setAttribute("autoplay", "");
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.load();
        video.play().then(() => {
          ready = true;
        }).catch(() => {});
      }

      function stopVideo() {
        started = false;
        ready = false;
        video.pause();
      }

      scene.addEventListener("arReady", () => {
        playVideo();
      });

      target.addEventListener("targetFound", () => {
        target.setAttribute("visible", "true");
        playVideo();
      });

      target.addEventListener("targetLost", () => {
        target.setAttribute("visible", "false");
        stopVideo();
      });

      

      
    });
  </script>
</body>
</html>
