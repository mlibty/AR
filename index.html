<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image.prod.js"></script>

  <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
    }

    #startButton {
      position: fixed;
      z-index: 9999;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 30px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      background: white;
      color: black;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button id="startButton">START AR</button>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>
  
  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  ></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-plane
      color="blue"
      opacity="0.5"
      position="0 0 0"
      height="0.552"
      width="1"
      rotation="0 0 0"
    ></a-plane>

  </a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const startButton = document.querySelector("#startButton");
  const sceneEl = document.querySelector("a-scene");

  startButton.addEventListener("click", async () => {

    // iOS camera permission trigger
    try {
      await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment"
        },
        audio: false
      });
    } catch (err) {
      alert("Camera permission denied: " + err);
      return;
    }

    // Start MindAR
    const mindarSystem = sceneEl.systems["mindar-image-system"];

    if (mindarSystem) {
      await mindarSystem.start();
    }

    startButton.style.display = "none";
  });
});
</script>

</body>
</html>
